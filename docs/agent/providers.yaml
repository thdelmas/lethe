# LETHE — LLM Provider Routing
# Referenced from docs/agent.yaml
#
# LETHE does NOT hardcode a single LLM endpoint. It routes requests
# to the best available model based on:
#   1. The TASK type (chat, code, vision, transcription, embedding)
#   2. Which PROVIDERS are configured (API keys present, reachable)
#   3. Which MODELS the user has enabled per provider
#   4. Current CONNECTIVITY (offline → local only, online → cloud ok)
#
# User configures providers in Settings > LETHE > Intelligence.

providers:
  local:
    type: "local"
    engine: "llama.cpp"
    endpoint: "http://127.0.0.1:8080"
    requires_internet: false
    requires_api_key: false
    models_dir: "/data/lethe/models"
    models:
      # ── Chat / Reasoning ──
      - id: "qwen3-0.6b"
        file: "qwen3-0.6b-q4_k_m.gguf"
        download_url: "https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/qwen3-0.6b-q4_k_m.gguf"
        size_mb: 450
        min_ram_mb: 600
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["chat"]
        context_window: 4096
        notes: "Qwen 3 — better reasoning than Qwen 2.5 at same size. Fits 2GB RAM."
      - id: "qwen3-1.7b"
        file: "qwen3-1.7b-q4_k_m.gguf"
        download_url: "https://huggingface.co/Qwen/Qwen3-1.7B-GGUF/resolve/main/qwen3-1.7b-q4_k_m.gguf"
        size_mb: 1100
        min_ram_mb: 1400
        arch: ["arm64", "x86_64"]
        tasks: ["chat", "summarize", "reasoning"]
        context_window: 8192
        notes: "Qwen 3 — strong local reasoning. Recommended for 3GB+ RAM."
      - id: "qwen3-3b"
        file: "qwen3-3b-q4_k_m.gguf"
        download_url: "https://huggingface.co/Qwen/Qwen3-3B-GGUF/resolve/main/qwen3-3b-q4_k_m.gguf"
        size_mb: 2000
        min_ram_mb: 3000
        arch: ["arm64", "x86_64"]
        tasks: ["chat", "code", "reasoning", "summarize"]
        context_window: 32768
        notes: "Qwen 3 3B — local code + reasoning for deeproot tier. Reduces cloud dependency."
      # ── Multimodal (text + vision + audio) ──
      - id: "gemma-3n-e2b"
        file: "gemma-3n-e2b-it-q4_k_m.gguf"
        download_url: "https://huggingface.co/google/gemma-3n-E2B-it-GGUF/resolve/main/gemma-3n-e2b-it-q4_k_m.gguf"
        size_mb: 1200
        min_ram_mb: 1500
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["chat", "vision", "summarize"]
        context_window: 8192
        notes: "Gemma 3n E2B — multimodal (text+vision) in <2GB RAM. Per-Layer Embeddings for radical RAM reduction. Designed with Qualcomm/MediaTek/Samsung."
      - id: "gemma-3n-e4b"
        file: "gemma-3n-e4b-it-q4_k_m.gguf"
        download_url: "https://huggingface.co/google/gemma-3n-E4B-it-GGUF/resolve/main/gemma-3n-e4b-it-q4_k_m.gguf"
        size_mb: 2800
        min_ram_mb: 3500
        arch: ["arm64", "x86_64"]
        tasks: ["chat", "vision", "reasoning", "summarize"]
        context_window: 32768
        notes: "Gemma 3n E4B — 4B active params, nested 2B sub-model. Full multimodal. Taproot+ tier."
      # ── Tool Calling ──
      - id: "functiongemma-270m"
        file: "functiongemma-270m-it-q4.gguf"
        download_url: "https://huggingface.co/google/functiongemma-270m-it"
        size_mb: 125
        min_ram_mb: 300
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["tool_calling"]
        context_window: 8192
        notes: "Gemma 3 270M fine-tuned for function/tool calling. 85% accuracy. Translates NL to system API actions. Key to making LETHE's agent act."
      # ── Speech (Sherpa-ONNX replaces Whisper) ──
      - id: "sherpa-onnx-streaming"
        engine_override: "sherpa-onnx"
        size_mb: 30
        min_ram_mb: 80
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["transcription", "tts", "vad"]
        notes: "Sherpa-ONNX streaming STT+TTS+VAD. Replaces Whisper+eSpeak. Int8 models for Cortex A7. 30MB streaming models."
      - id: "whisper-tiny"
        file: "ggml-tiny.bin"
        download_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin"
        size_mb: 75
        min_ram_mb: 200
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["transcription"]
        notes: "Fallback if Sherpa-ONNX unavailable."
      - id: "whisper-base"
        file: "ggml-base.bin"
        download_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"
        size_mb: 150
        min_ram_mb: 300
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["transcription"]
      # ── Embeddings (for Mnemosyne memory system) ──
      - id: "all-minilm-l6-v2"
        engine_override: "tract"
        size_mb: 80
        min_ram_mb: 120
        arch: ["armv7", "arm64", "x86_64"]
        tasks: ["embeddings"]
        notes: "22M param embedding model. Runs on ARMv7. For on-device semantic search / Mnemosyne."
      - id: "embeddinggemma-300m"
        engine_override: "tract"
        size_mb: 200
        min_ram_mb: 400
        arch: ["arm64", "x86_64"]
        tasks: ["embeddings"]
        notes: "308M params. 100+ languages. <15ms per 256 tokens. Taproot+ only."
      # ── Vision ──
      - id: "smolvlm-256m"
        size_mb: 300
        min_ram_mb: 1000
        arch: ["arm64"]
        tasks: ["vision"]
        notes: "Smallest dedicated VLM. 81 tokens per 384x384 image. Taproot+ tier. Gemma 3n also handles vision on lower tiers."
      - id: "moondream-0.5b"
        file: "moondream-0.5b-q4_k_m.gguf"
        download_url: "https://huggingface.co/vikhyat/moondream2-gguf/resolve/main/moondream-0.5b-q4_k_m.gguf"
        size_mb: 400
        min_ram_mb: 1500
        arch: ["arm64", "x86_64"]
        tasks: ["vision"]
        notes: "MoE VLM with UI localization (ScreenSpot F1: 80.4). Agent can understand and interact with app screens. Deeproot tier."

  anthropic:
    type: "cloud"
    api_format: "anthropic"
    endpoint: "https://api.anthropic.com"
    requires_internet: true
    requires_api_key: true
    api_key_setting: "persist.lethe.provider.anthropic.key"
    models:
      - id: "claude-opus-4-6"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 1000000
      - id: "claude-sonnet-4-6"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 200000
      - id: "claude-haiku-4-5-20251001"
        tasks: ["chat", "summarize"]
        context_window: 200000

  openrouter:
    type: "cloud"
    api_format: "openai"
    endpoint: "https://openrouter.ai/api/v1"
    requires_internet: true
    requires_api_key: true
    api_key_setting: "persist.lethe.provider.openrouter.key"
    extra_headers:
      HTTP-Referer: "https://osmosis.dev"
      X-Title: "LETHE"
    models:
      - id: "anthropic/claude-opus-4-6"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 1000000
      - id: "anthropic/claude-sonnet-4-6"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 200000
      - id: "qwen/qwen3-72b"
        tasks: ["chat", "code", "reasoning", "summarize"]
        context_window: 131072
      - id: "meta-llama/llama-4-maverick"
        tasks: ["chat", "reasoning", "vision", "summarize"]
        context_window: 1048576
      - id: "meta-llama/llama-4-scout"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 524288
        notes: "16-expert MoE, 109B total / 17B active. Strong coding + vision. Apache 2.0."
      - id: "google/gemini-2.5-pro"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 1000000
      - id: "google/gemini-2.5-flash"
        tasks: ["chat", "code", "reasoning", "vision", "summarize"]
        context_window: 1000000
        notes: "Fast + cheap. Good fallback when Opus/Pro quota exhausted."

  custom:
    type: "cloud"
    api_format: "openai"
    endpoint_setting: "persist.lethe.provider.custom.endpoint"
    requires_internet: true
    requires_api_key: false
    api_key_setting: "persist.lethe.provider.custom.key"
    models: []

# ── Task types ──
tasks:
  chat:
    desc: "General conversation"
    priority: ["local", "cloud"]
    fallback_message: >
      I can hear you, but my thinking is limited to what runs
      on this device right now.
  code:
    desc: "Code generation, debugging, refactoring"
    priority: ["cloud", "local"]
    required_models: ["claude-opus-4-6", "claude-sonnet-4-6", "qwen3-3b"]
    fallback_message: >
      Code tasks need a more capable model. Add an Anthropic
      or OpenRouter key in Settings, or download Qwen 3 (3B)
      for basic local code help.
  reasoning:
    desc: "Complex analysis, planning, multi-step logic"
    priority: ["cloud"]
    fallback_message: >
      This needs deeper thinking than I can do locally.
      Connect me to a cloud provider.
  vision:
    desc: "Image understanding, screenshot analysis"
    priority: ["local", "cloud"]
    required_models: ["gemma-3n-e2b", "gemma-3n-e4b", "smolvlm-256m", "moondream-0.5b", "claude-opus-4-6", "claude-sonnet-4-6", "google/gemini-2.5-pro"]
    fallback_message: >
      I cannot see images without a vision-capable model.
      Download Gemma 3n or SmolVLM in Settings, or add a
      cloud provider key.
  transcription:
    desc: "Speech-to-text"
    priority: ["local"]
    required_models: ["sherpa-onnx-streaming", "whisper-tiny", "whisper-base"]
    fallback_message: >
      I need a speech model to hear you. Download one
      in Settings > LETHE > Voice.
  tts:
    desc: "Text-to-speech"
    priority: ["local"]
    required_models: ["sherpa-onnx-streaming"]
    fallback_message: >
      Voice output needs a TTS model. Falling back to eSpeak.
  tool_calling:
    desc: "Translate natural language to system API actions"
    priority: ["local", "cloud"]
    required_models: ["functiongemma-270m"]
    fallback_message: >
      I need the FunctionGemma model to take actions.
      Download it in Settings > LETHE > Intelligence.
  embeddings:
    desc: "Semantic search for Mnemosyne memory system"
    priority: ["local"]
    required_models: ["all-minilm-l6-v2", "embeddinggemma-300m"]
    fallback_message: >
      Memory search needs an embedding model. Download one
      in Settings > LETHE > Intelligence.
  summarize:
    desc: "Summarize text, articles, conversations"
    priority: ["local", "cloud"]
  # ── Future task types (research phase, no models assigned yet) ──
  action:
    desc: "Execute multi-step actions across apps and system APIs (LAM)"
    priority: ["local", "cloud"]
    notes: >
      Currently handled by tool_calling (FunctionGemma 270M at 85%).
      Dedicated LAM models may surpass this. Watch: Gorilla LLM,
      NexusRaven, Google function-call Gemma variants.
    fallback_message: >
      I need an action model to do that. Download FunctionGemma
      in Settings > LETHE > Intelligence.
  segmentation:
    desc: "Segment objects in images for accessibility or camera input (SAM)"
    priority: ["local"]
    notes: >
      No model assigned yet. Evaluate MobileSAM / EfficientSAM
      when arm64 deeproot-tier devices are primary targets.
    fallback_message: >
      Object segmentation is not available yet.

# ── Routing logic ──
routing:
  connectivity_check:
    url: "https://connectivity.grapheneos.org/generate_204"
    timeout_ms: 5000
    cache_ttl_s: 30
  offline_behavior: "local_only"
  offline_greeting: "I am running on my own. Private but limited."
  online_greeting: "Connected. Full capabilities available."

# ── Settings UI ──
settings_ui:
  sections:
    - title: "Providers"
      desc: "Connect LETHE to AI services"
      items:
        - provider: "anthropic"
          label: "Anthropic"
          input: "api_key"
          hint: "sk-ant-..."
        - provider: "openrouter"
          label: "OpenRouter"
          input: "api_key"
          hint: "sk-or-..."
        - provider: "custom"
          label: "Custom endpoint"
          input: "url"
          hint: "https://my-server.com/v1"
    - title: "Local models"
      desc: "Download models to run offline"
      items:
        - model: "qwen3-0.6b"
          label: "Qwen 3 (0.6B) — basic chat"
          size: "450 MB"
        - model: "qwen3-1.7b"
          label: "Qwen 3 (1.7B) — chat + reasoning"
          size: "1.1 GB"
          min_ram: "3 GB"
        - model: "qwen3-3b"
          label: "Qwen 3 (3B) — chat + code + reasoning"
          size: "2 GB"
          min_ram: "6 GB"
        - model: "gemma-3n-e2b"
          label: "Gemma 3n (E2B) — chat + vision, ultra-low RAM"
          size: "1.2 GB"
        - model: "gemma-3n-e4b"
          label: "Gemma 3n (E4B) — chat + vision + reasoning"
          size: "2.8 GB"
          min_ram: "4 GB"
        - model: "functiongemma-270m"
          label: "FunctionGemma — tool calling (actions)"
          size: "125 MB"
        - model: "sherpa-onnx-streaming"
          label: "Sherpa-ONNX — voice in + out"
          size: "30 MB"
        - model: "whisper-base"
          label: "Whisper Base — voice input (legacy)"
          size: "150 MB"
        - model: "all-minilm-l6-v2"
          label: "MiniLM — memory search"
          size: "80 MB"
        - model: "embeddinggemma-300m"
          label: "EmbeddingGemma — memory search (100+ languages)"
          size: "200 MB"
          min_ram: "4 GB"
        - model: "smolvlm-256m"
          label: "SmolVLM — screen understanding"
          size: "300 MB"
          min_ram: "4 GB"
        - model: "moondream-0.5b"
          label: "Moondream — app screen understanding + UI interaction"
          size: "400 MB"
          min_ram: "6 GB"
    - title: "Task routing"
      desc: "Which model handles what"
