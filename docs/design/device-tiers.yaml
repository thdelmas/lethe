# LETHE Device Tier System
#
# Every device gets a tier based on hardware capability.
# Tier determines: avatar mode, local model selection, animation budget,
# feature availability, and performance targets.
#
# Three tiers — named after root depth, not "quality."
# Even the shallowest root keeps the plant alive.
#
# User can always override avatar tier in Settings > LETHE > Appearance.
# Feature flags can be toggled individually regardless of tier.

# ═══════════════════════════════════════
# Tier definitions
# ═══════════════════════════════════════

tiers:
  shallow:
    # Old devices, limited hardware. Still fully functional.
    # LETHE runs, protects, and communicates — just lighter.
    desc: "Devices with ≤2GB RAM, ARMv7 or early ARM64, weak GPU"
    avatar: "static"                     # PNG only, no animation overhead
    avatar_options: ["static", "2d"]     # User can try 2d if they want
    avatar_renderer: "css3d"             # CSS 3D transforms for idle state (near-zero CPU)
    local_models: ["qwen3-0.6b", "functiongemma-270m", "sherpa-onnx-streaming", "all-minilm-l6-v2"]
    # Budget: ~510-800MB total (see gems-ai-inference.md §6)
    # FunctionGemma 125MB + Qwen3 0.6B 450MB + Sherpa 30MB + MiniLM 50MB
    # Future: Gemma 3n E2B (<2GB multimodal), BitNet b1.58 (integer-only math)
    animation_fps: 0                     # No animation by default
    particles: false
    gyroscope_parallax: false
    webgl: false
    tor: true                            # Privacy features always available
    ipfs_ota: true
    agent: true
    burner_mode: true
    performance:
      clock_update_interval_ms: 30000    # Every 30s to save CPU
      agent_check_interval_ms: 60000     # Check backend every 60s
      chat_max_history: 20               # Keep memory light

  taproot:
    # Mid-range devices. Good enough for the full experience with
    # some budget-consciousness.
    desc: "Devices with 3-6GB RAM, modern ARM64, mid-range GPU"
    avatar: "2d"                         # Animated PNG, CSS transforms
    avatar_options: ["static", "2d", "3d"]
    avatar_renderer: "ogl"               # OGL (lighter than Three.js) + springTo.js
    local_models: ["qwen3-0.6b", "qwen3-1.7b", "functiongemma-270m", "sherpa-onnx-streaming", "embeddinggemma-300m"]
    # Budget: ~915MB-1.5GB (see gems-ai-inference.md §6)
    # Use MLLM engine on Snapdragon devices to unlock NPU
    animation_fps: 30
    particles: true
    particle_count: 3
    gyroscope_parallax: true
    webgl: true                          # Available but not default avatar
    tor: true
    ipfs_ota: true
    agent: true
    burner_mode: true
    performance:
      clock_update_interval_ms: 10000
      agent_check_interval_ms: 30000
      chat_max_history: 50

  deeproot:
    # Flagships. Full experience, no compromises.
    desc: "Devices with ≥8GB RAM, flagship SoC, strong GPU"
    avatar: "3d"                         # Full WebGL GLB model
    avatar_options: ["static", "2d", "3d"]
    avatar_renderer: "threejs"           # Three.js (or OGL) + IK + spring physics
    local_models: ["qwen3-0.6b", "qwen3-1.7b", "qwen3-4b", "functiongemma-270m", "sherpa-onnx-streaming", "embeddinggemma-300m", "smolvlm-256m"]
    # Budget: ~2.8-3.8GB (see gems-ai-inference.md §6)
    # SmolVLM loaded on-demand for screen understanding
    # Use MLLM engine with QNN/NPU on Snapdragon flagships
    animation_fps: 60
    particles: true
    particle_count: 6
    gyroscope_parallax: true
    webgl: true
    tor: true
    ipfs_ota: true
    agent: true
    burner_mode: true
    performance:
      clock_update_interval_ms: 10000
      agent_check_interval_ms: 15000
      chat_max_history: 200

