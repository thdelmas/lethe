# ═══════════════════════════════════════
# Runtime detection fallback
# ═══════════════════════════════════════
# If the device codename isn't in the map above (unknown device,
# custom build), runtime detection kicks in.
#
# The heuristic in mascot-tier.js + device-detect.js:
#   1. Query navigator.deviceMemory (if available)
#   2. Query navigator.hardwareConcurrency (CPU cores)
#   3. Probe WebGL GPU renderer string
#   4. Assign tier:
#      - memory < 3 OR cores < 4 OR weak GPU → shallow
#      - memory < 8 AND not weak GPU          → taproot
#      - memory >= 8 AND strong GPU           → deeproot

runtime_detection:
  shallow_if:
    memory_gb_lt: 3
    cores_lt: 4
    gpu_blocklist: ["mali-4", "adreno 2", "adreno 30", "sgx 5", "powervr sgx"]
  taproot_if:
    memory_gb_lt: 8
  deeproot_if:
    memory_gb_gte: 8
    gpu_allowlist: ["adreno 6", "adreno 7", "mali-g7", "mali-g6", "xclipse"]

# ═══════════════════════════════════════
# GLB model LOD
# ═══════════════════════════════════════
# Multiple versions of the mascot for different tiers.
# Generated from the same source model at different decimation ratios.

mascot_lod:
  high:
    file: "mascot-high.glb"
    verts: 19000                         # Simplified from 755K original
    size_kb: 3000
    tier: "deeproot"
  low:
    file: "mascot-low.glb"
    verts: 5000                          # Further decimated for mid-range
    size_kb: 800
    tier: "taproot"
  # shallow tier uses mascot.png (2D), no GLB needed
