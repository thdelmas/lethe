name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install 'ruff>=0.15,<1' pyyaml

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Code quality checks
        run: bash scripts/code-quality-check.sh

  rust-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      # ring's build.rs invokes cc directly for its C glue, so the Android
      # NDK toolchain has to be on PATH for the cross-target checks below.
      # cargo-ndk wires the right CC_<target>/AR_<target> env per target.
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r25c
          add-to-path: true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Check (host)
        run: cargo check --manifest-path agent/Cargo.toml

      - name: Check (armv7)
        run: cargo ndk --manifest-path agent/Cargo.toml -t armeabi-v7a check

      - name: Check (aarch64)
        run: cargo ndk --manifest-path agent/Cargo.toml -t arm64-v8a check
