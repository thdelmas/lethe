# LETHE — EdgeVPN trusted device clusters
# Creates an encrypted mesh between the user's own devices (phone + Pi +
# NAS + laptop) using libp2p under the hood. Pair devices with a shared
# token, then the cluster appears as a private network where one device
# can offload heavy inference to another or back up files.
#
# Disabled by default. User enables per-device in Settings > LETHE >
# Device Cluster.

# Master toggle
persist.lethe.cluster.enabled=false

# Cluster token (generated by first device, shared with others)
# Stored encrypted on /persist, never in plain text config.
persist.lethe.cluster.token_path=/persist/lethe/cluster/token

# Network name for this cluster (cosmetic, shown in UI)
persist.lethe.cluster.name=

# Interface name for the tun device
persist.lethe.cluster.iface=lethe0

# Private IP range (unique per cluster, avoid LAN conflicts)
persist.lethe.cluster.subnet=10.42.0.0/16

# Advertise this device's capabilities to the cluster
# (model availability, storage capacity, GPU presence)
persist.lethe.cluster.advertise=true

# Allow this device to accept inference offload from cluster peers
persist.lethe.cluster.accept_inference=true

# Battery threshold — disable advertising below this to save power
persist.lethe.cluster.min_battery=20

# Heartbeat interval — adjusted based on power state
persist.lethe.cluster.heartbeat_charging=30
persist.lethe.cluster.heartbeat_battery=300
