# LETHE — Decentralized config channels
# Subscribes to IPNS-published content channels for automatic updates.
# Each channel is an IPNS key pointing to signed content.
#
# Channels are defined in /persist/lethe/channels/*.json
# The sync script runs every 6 hours alongside the OTA updater.
#
# All content MUST be signed — unsigned channels are rejected.
# Users add channels in Settings > LETHE > Channels, or by
# importing a channel QR code.

# Master toggle
persist.lethe.channels.enabled=true

# Sync interval (reuses OTA schedule: every 6 hours)
persist.lethe.channels.sync_interval=21600

# Default channels (created on first boot if not present)
persist.lethe.channels.defaults=hosts,advisories
