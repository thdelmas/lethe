# Lethe Launcher — "Void"
# A near-empty home screen. The wallpaper is the art.
# Clock breathes. Apps are text. Nothing else.
#
# Lethe replaces Trebuchet with a purpose-built minimal launcher.
# No dock. No widgets. No grid. No search bar.
# One page. One clock. Gestures for everything else.

# ── Launcher selection ──
# Lethe ships its own launcher as a system app.
# Trebuchet (LineageOS default) is removed during debloat.
persist.lethe.launcher=void
persist.lethe.launcher.package=org.osmosis.lethe.void

# ── Home screen ──
# The home screen shows ONLY:
#   1. Wallpaper (full bleed, no dimming)
#   2. Clock + date (center-bottom third)
#   3. Nothing else
persist.lethe.launcher.home.pages=1
persist.lethe.launcher.home.dock=false
persist.lethe.launcher.home.search_bar=false
persist.lethe.launcher.home.widgets=false
persist.lethe.launcher.home.app_icons=false
persist.lethe.launcher.home.status_bar_home=true

# ── Clock ──
# Thin monospace numerals, vertically centered in the lower third.
# Hours and minutes stacked, colon replaced by a breathing red dot.
# Date below in uppercase stencil letters, dimmed.
#
#       23
#        ·          ← teal dot, bio-pulse animation
#       07
#    SATURDAY
#   29 MARCH
#
persist.lethe.launcher.clock.layout=stacked
persist.lethe.launcher.clock.font=monospace
persist.lethe.launcher.clock.weight=200
persist.lethe.launcher.clock.size_hours=72sp
persist.lethe.launcher.clock.size_date=11sp
persist.lethe.launcher.clock.color_hours=ff_dcc8c0
persist.lethe.launcher.clock.color_dot=ff_22e8a0
persist.lethe.launcher.clock.color_date=ff_3a5840
persist.lethe.launcher.clock.dot_animation=bio_pulse
persist.lethe.launcher.clock.dot_pulse_duration=3500
persist.lethe.launcher.clock.position=center_lower_third
persist.lethe.launcher.clock.letter_spacing_date=0.18em
persist.lethe.launcher.clock.uppercase_date=true
persist.lethe.launcher.clock.format_24h=true

# ── App drawer ──
# Swipe up from anywhere to open. Full-screen overlay, near-black.
# Apps listed as monospace text — no icons, no grid.
# Single column, alphabetical, scrollable.
# Each app name has a single teal initial letter.
# Search by typing — keyboard auto-opens on second swipe-up.
#
#   F-Droid
#   Mull
#   Orbot
#   Signal
#
persist.lethe.launcher.drawer.trigger=swipe_up
persist.lethe.launcher.drawer.style=text_list
persist.lethe.launcher.drawer.show_icons=false
persist.lethe.launcher.drawer.columns=1
persist.lethe.launcher.drawer.font=monospace
persist.lethe.launcher.drawer.font_weight=400
persist.lethe.launcher.drawer.font_size=18sp
persist.lethe.launcher.drawer.color_initial=ff_22e8a0
persist.lethe.launcher.drawer.color_name=ff_dcc8c0
persist.lethe.launcher.drawer.color_bg=e6_080404
persist.lethe.launcher.drawer.sort=alphabetical
persist.lethe.launcher.drawer.search=swipe_up_again
persist.lethe.launcher.drawer.search_inline=true
persist.lethe.launcher.drawer.line_height=56dp
persist.lethe.launcher.drawer.padding_horizontal=48dp
persist.lethe.launcher.drawer.animation_in=fade_up
persist.lethe.launcher.drawer.animation_duration=200

# ── Section dividers ──
# Alphabetical letter headers between groups of apps.
# Shown as a single dim letter left-aligned above the group.
# Only shown when there are 12+ apps (below that, not needed).
persist.lethe.launcher.drawer.section_headers=true
persist.lethe.launcher.drawer.section_headers_min_apps=12
persist.lethe.launcher.drawer.section_header_color=20_22e8a0
persist.lethe.launcher.drawer.section_header_size=13sp
persist.lethe.launcher.drawer.section_header_weight=600
persist.lethe.launcher.drawer.section_header_margin_top=24dp

# ── Fast scroll ──
# A thin alphabetical index on the right edge of the drawer.
# Appears on touch-and-drag, fades out after 1.5s of no touch.
# Tapping a letter jumps to that section.
persist.lethe.launcher.drawer.fast_scroll=true
persist.lethe.launcher.drawer.fast_scroll_color=40_22e8a0
persist.lethe.launcher.drawer.fast_scroll_width=24dp
persist.lethe.launcher.drawer.fast_scroll_fade_ms=1500

# ── LETHE mascot on home screen ──
# A small animated mascot sits on the home screen — always alive,
# always watching. Tap it to open the full LETHE conversation.
# This replaces the invisible "long-press home" gesture as the
# primary way to interact with LETHE.
#
# The mascot is a floating WebView overlay showing the same SVG
# as the conversation UI, but in miniature idle mode. It breathes,
# blinks, reacts to gyroscope, and dims with battery level.
#
# Position: just below the clock, centered. Small enough to not
# block the wallpaper, large enough to be clearly alive.
#
#       23
#        ·
#       07
#    SATURDAY
#   29 MARCH
#
#      [mascot]     ← breathing, blinking, ambient-aware
#
persist.lethe.launcher.mascot.enabled=true
persist.lethe.launcher.mascot.position=below_clock
persist.lethe.launcher.mascot.size=64dp
persist.lethe.launcher.mascot.margin_top=24dp
persist.lethe.launcher.mascot.tap_action=open_lethe_agent
persist.lethe.launcher.mascot.long_press_action=open_lethe_agent
persist.lethe.launcher.mascot.idle_animations=true
persist.lethe.launcher.mascot.gyroscope=true
persist.lethe.launcher.mascot.ambient_awareness=true
persist.lethe.launcher.mascot.particles=true
persist.lethe.launcher.mascot.particle_count=3
persist.lethe.launcher.mascot.opacity=0.85
persist.lethe.launcher.mascot.glow_radius=12dp
persist.lethe.launcher.mascot.glow_color=18_22e8a0
# The mascot WebView loads a lightweight version of the mascot SVG.
# No chat UI, no input — just the animated presence.
# The entire launcher is one WebView. Clock, mascot, gestures, and chat
# are all in one page. The agent is optional — without it the phone
# still works as a minimal launcher (clock + wallpaper + gestures).
persist.lethe.launcher.webview_url=file:///system/extras/lethe/agent/static/launcher.html

# ── Gestures ──
# The home screen is gesture-driven. No buttons, no labels.
# Long-press still works as a backup to open LETHE, but the
# mascot tap is now the primary interaction.
persist.lethe.launcher.gesture.swipe_up=open_drawer
persist.lethe.launcher.gesture.swipe_down=expand_notifications
persist.lethe.launcher.gesture.double_tap=screen_off
persist.lethe.launcher.gesture.long_press=lethe_agent
persist.lethe.launcher.gesture.swipe_left=none
persist.lethe.launcher.gesture.swipe_right=none
persist.lethe.launcher.gesture.pinch=none

# ── Notifications on home ──
# No badge counts. No dots on a dock (there is no dock).
# Missed notifications shown as faint red embers at the
# top edge of the screen — one ember per notification,
# evenly spaced, gently pulsing.
persist.lethe.launcher.notifications.style=embers
persist.lethe.launcher.notifications.color=40_c81e1e
persist.lethe.launcher.notifications.position=top_edge
persist.lethe.launcher.notifications.max_visible=5
persist.lethe.launcher.notifications.pulse=true
persist.lethe.launcher.notifications.pulse_duration=4000

# ── Recents ──
# Recent apps are not a carousel. Swipe-up-and-hold shows
# the last 4 apps as small monospace labels in a vertical
# stack, centered on screen. Tap to switch, release to cancel.
persist.lethe.launcher.recents.style=text_stack
persist.lethe.launcher.recents.max=4
persist.lethe.launcher.recents.trigger=swipe_up_hold
persist.lethe.launcher.recents.font_size=14sp
persist.lethe.launcher.recents.color=ff_8a6660
persist.lethe.launcher.recents.color_active=ff_dcc8c0

# ── First-run ──
# On first boot, the launcher shows no tutorial.
# It's self-evident: a clock on a dark canvas.
# Hints appear progressively — one at a time, only on idle.
# Each hint fades in after inactivity, fades out on touch.
# Once a gesture is used, its hint never shows again.
persist.lethe.launcher.first_run.hint=true
persist.lethe.launcher.first_run.hint_delay=5000
persist.lethe.launcher.first_run.hint_fade_duration=2000
persist.lethe.launcher.first_run.hint_color=30_dcc8c0

# Hint sequence — shown one per idle period, in order.
# Each hint is retired once the user performs that gesture.
persist.lethe.launcher.first_run.hints.0.text=swipe up
persist.lethe.launcher.first_run.hints.0.gesture=swipe_up
persist.lethe.launcher.first_run.hints.0.position=bottom_center
persist.lethe.launcher.first_run.hints.1.text=swipe down for notifications
persist.lethe.launcher.first_run.hints.1.gesture=swipe_down
persist.lethe.launcher.first_run.hints.1.position=top_center
persist.lethe.launcher.first_run.hints.2.text=double-tap to sleep
persist.lethe.launcher.first_run.hints.2.gesture=double_tap
persist.lethe.launcher.first_run.hints.2.position=center
persist.lethe.launcher.first_run.hints.3.text=tap the guardian
persist.lethe.launcher.first_run.hints.3.gesture=tap_mascot
persist.lethe.launcher.first_run.hints.3.position=below_clock

# After all hints are retired, a gesture cheatsheet is accessible
# via Settings > Void Launcher > Gestures. Never forced on the user.
persist.lethe.launcher.gesture_help.enabled=true
persist.lethe.launcher.gesture_help.path=settings
