# Lethe — Default firewall rules (nftables)
# Default-deny outbound for user apps. System UIDs are allowed.
# Users grant network access per-app through the Lethe privacy dashboard.

table inet lethe_firewall {
    chain input {
        type filter hook input priority 0; policy accept;
        # Accept established connections
        ct state established,related accept
        # Accept loopback
        iifname "lo" accept
    }

    chain output {
        type filter hook output priority 0; policy drop;

        # Always allow loopback
        oifname "lo" accept

        # Allow established connections
        ct state established,related accept

        # Allow DNS-over-TLS (port 853) to configured resolvers
        tcp dport 853 accept

        # Allow system UIDs (0-9999)
        meta skuid 0-9999 accept

        # Allow NTP
        udp dport 123 accept

        # Allow DHCP
        udp dport 67-68 accept

        # User apps: blocked by default.
        # Per-app rules are added dynamically by the Lethe firewall service
        # when the user grants network access to an app.
        # Example (added at runtime):
        #   meta skuid 10045 accept  # Signal
        #   meta skuid 10102 accept  # F-Droid

        # Log and drop everything else
        log prefix "lethe-fw-drop: " drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}
