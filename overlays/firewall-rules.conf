# Lethe — Firewall rules (nftables)
# Enforces Tor-only networking for user apps.
# System UIDs go direct. User apps are transparently redirected through Tor.
#
# Architecture:
#   User app → iptables REDIRECT → Tor TransPort (9040) → Tor network → destination
#   User DNS → iptables REDIRECT → Tor DNSPort (5400) → resolved via Tor
#   System   → direct (NTP, DHCP, OTA checks, IPFS swarm via Tor SOCKS)
#
# No user app traffic ever leaves the device without going through Tor.

table inet lethe_firewall {

    # ── INPUT: default deny ──
    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        iifname "lo" accept
        # DHCP replies
        udp sport 67-68 accept
        # Drop everything else
        log prefix "lethe-fw-in-drop: " drop
    }

    # ── OUTPUT: Tor-enforced ──
    chain output {
        type filter hook output priority 0; policy drop;

        # Always allow loopback (Tor, Bender, IPFS API all run on localhost)
        oifname "lo" accept

        # Allow established connections
        ct state established,related accept

        # ── Tor daemon itself (UID 9050) must reach the network ──
        meta skuid 9050 accept

        # ── IPFS daemon (UID 9051) — routed through Tor SOCKS internally ──
        # IPFS connects to 127.0.0.1:9050 (Tor SOCKS), not direct.
        # Block direct internet for IPFS UID, only allow loopback (already covered above).

        # ── System UIDs (0-9999, excluding user apps) — selective direct access ──
        # DNS-over-TLS to privacy resolvers (system DNS, not user apps)
        meta skuid 0-9999 tcp dport 853 accept
        # NTP
        meta skuid 0-9999 udp dport 123 accept
        # DHCP
        meta skuid 0-9999 udp dport 67-68 accept

        # ── User apps: ALL traffic blocked (redirected to Tor via NAT) ──
        # User app packets that somehow bypass NAT redirect are dropped here.
        # This is a safety net — NAT table handles the actual routing.

        # Log and drop everything else
        log prefix "lethe-fw-drop: " drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}

# ── NAT: Transparent Tor redirect for user apps ──
# Applied via iptables (Android 7.x) or nftables (Android 10+).
# User app traffic (UID >= 10000) is redirected to Tor's TransPort/DNSPort.
#
# Equivalent iptables rules (applied by init.lethe-tor.rc):
#
#   # Redirect user app DNS to Tor DNS
#   iptables -t nat -A OUTPUT -m owner --uid-owner 10000-99999 -p udp --dport 53 \
#       -j REDIRECT --to-ports 5400
#   iptables -t nat -A OUTPUT -m owner --uid-owner 10000-99999 -p tcp --dport 53 \
#       -j REDIRECT --to-ports 5400
#
#   # Redirect all user app TCP to Tor TransPort
#   iptables -t nat -A OUTPUT -m owner --uid-owner 10000-99999 -p tcp \
#       -j REDIRECT --to-ports 9040
#
#   # Drop user app UDP (Tor only supports TCP — UDP leak prevention)
#   iptables -A OUTPUT -m owner --uid-owner 10000-99999 -p udp ! --dport 53 -j DROP
