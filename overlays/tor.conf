# Lethe — Tor transparent proxy configuration
# All user app traffic is forced through Tor via iptables.
# System traffic (NTP, DNS, OTA) goes direct — only user-facing apps are routed.
#
# Tor runs as a system service (UID 9050) with a TransPort on 9040
# and a DNS port on 5400. The firewall redirects all user app traffic
# to these ports.

# ── Tor daemon settings ──
# Stored at /system/etc/tor/torrc at build time.
# Tor runs as UID 9050 (lethe-tor) with no exit relay capability.

SocksPort 127.0.0.1:9050 IsolateSOCKSAuth IsolateDestAddr
TransPort 127.0.0.1:9040 IsolateDestAddr
DNSPort 127.0.0.1:5400

# Use only Tor for DNS — no system DNS leak
AutomapHostsOnResolve 1

# Hardened entry nodes — use only guards with Guard flag
UseEntryGuards 1
NumEntryGuards 3

# Disable features that leak metadata
AvoidDiskWrites 1
SafeLogging 1

# Bridge support (user can enable via Settings > Privacy > Tor > Bridges)
# Uncommented at runtime if bridges are configured.
# UseBridges 1
# ClientTransportPlugin obfs4 exec /system/bin/obfs4proxy

# Data directory — /data/lethe/tor on most devices.
# init.lethe-tor.rc creates it and chowns to the Tor UID.
DataDirectory /data/lethe/tor

# Log to logcat
Log notice syslog
