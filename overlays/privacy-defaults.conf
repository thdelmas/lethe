# Lethe — Privacy overlay defaults
# Applied on top of LineageOS system properties at build time.
#
# These properties override Android defaults to prioritize privacy.
# They are baked into the system image (not runtime-configurable).

# ── DNS ──
# Use Quad9 DNS-over-TLS instead of Google DNS.
net.dns.tls.server=dns.quad9.net
net.dns.tls.fallback=dns.mullvad.net
net.dns.tls.mode=strict

# ── Captive portal ──
# Disable captive portal validation entirely. Pointing the check at any
# external host (Google, GrapheneOS, etc.) causes Android to drop the
# network when that host is unreachable — which happens constantly on
# phones with strict DoT, IPv6-only DNS, or restrictive firewalls (i.e.
# a LETHE phone in normal operation). The check leaks metadata anyway.
# Keys without a dot are Settings.Global, applied at first boot by
# /system/bin/lethe-apply-settings.sh (see initrc/init.lethe-settings.rc).
captive_portal_mode=0
captive_portal_detection_enabled=0

# ── NTP ──
# Use Cloudflare NTP, not Google.
persist.sys.ntp_server=time.cloudflare.com

# ── Location ──
# Disable network location provider (uses Google servers).
ro.com.google.gmsversion=
ro.com.google.clientidbase=

# ── Analytics & telemetry ──
ro.setupwizard.mode=DISABLED
ro.config.nocheckin=1
profiler.force_disable_ulog=true
profiler.force_disable_err_rpt=true
persist.sys.strictmode.disable=true

# ── Burner mode default ──
# Default ON: every boot triggers /system/bin/lethe-burner-wipe.sh which
# wipes user data + identity. User overrides via Settings (writes to
# /data/property/persist.lethe.burner.enabled, persists across boots).
# This default lives in build.prop so the wipe script's getprop check
# actually returns "true" on a fresh device.
persist.lethe.burner.enabled=true

# ── BFU auto-reboot (lethe#100) ──
# Return device to Before-First-Unlock state after inactivity. Evicts the
# CE class keys from RAM, raising the cost of cold-boot / DMA extraction
# on a powered-on, unlocked device. Off by default; default-on in Border
# Mode (lethe#110). Active call defers the reboot.
persist.lethe.bfu.enabled=false
persist.lethe.bfu.timeout=15

# ── Sensor defaults ──
# Background location denied by default.
# Note: prop keys are abbreviated to fit Android's 31-byte PROPERTY_KEY_MAX.
persist.lethe.bg_loc=deny
persist.lethe.body_sens=deny
persist.lethe.near_dev=deny

# ── MAC randomization ──
# Per-connection randomization (Android 14+): each WiFi connection uses
# a different MAC, preventing network-level session correlation.
# Falls back to per-boot randomization on older Android versions.
persist.lethe.mac_rand=per_connection

# ── Clipboard & keyboard ──
# Prevent clipboard content from being shared across apps.
persist.lethe.clip_iso=true

# ── USB ──
# ADB hardening (ro.adb.secure=1 + ro.debuggable=0) is deferred to v1.1.
# Forcing those values on a userdebug build conflicts with the build
# variant's defaults and was observed to crash-loop zygote on cm-14.1
# (the build variant should set these consistently, not an overlay).
# v1.0 ships with the LineageOS-default USB/ADB config.
service.adb.tcp.port=-1

# ── Camera/mic indicators ──
# Always show indicator when camera or mic is in use.
persist.lethe.cam_ind=true
persist.lethe.mic_ind=true

# ── Scramble PIN layout ──
# Randomize PIN pad digit positions on lock screen.
persist.lethe.pin_scramble=true

# ── SELinux ──
# SELinux enforcement is set by the build variant + device-tree config.
# We removed our explicit overrides for v1.0: persist.sys.audit.enforce=1
# was rejecting denials that LineageOS expects to be permissive on early
# cm-14.1 boot, and ro.build.selinux=1 conflicts with /sepolicy load.

# ── Tor ──
# Tor transparent proxy — all user app traffic routed through Tor.
persist.lethe.tor.enabled=true
persist.lethe.tor.transport=9040
persist.lethe.tor.dnsport=5400
persist.lethe.tor.socksport=9050
# Pluggable transport for bridges (lethe#108). One of:
#   none      — direct connection (default)
#   obfs4     — most common; blocked in some jurisdictions (e.g. China since
#               Apr 2025) so consider a fallback if you're in one
#   meek      — Azure CDN-fronted; works where obfs4 is blocked
#   webtunnel — websocket-over-HTTPS; requires user-supplied bridge lines
#   snowflake — peer-to-peer through volunteer browser proxies
persist.lethe.tor.bridge_pt=none
# Tor data persists across burner wipes (stored on /persist).
# Bridge mode disabled by default — user enables via Settings.
persist.lethe.tor.bridges=false

# ── IPFS OTA ──
# Lightweight IPFS client for receiving firmware updates.
# Swarm traffic routed through Tor SOCKS.
persist.lethe.ipfs.enabled=true
persist.lethe.ipfs.mode=client
persist.lethe.ipfs.proxy=socks5://127.0.0.1:9050

# ── Encryption ──
# Encryption state is set by the LineageOS build itself based on
# TARGET_USERIMAGES_USE_F2FS and the device's vold config — overriding
# ro.crypto.state from a config file confuses vold on devices where
# encryption is disabled (e.g. t0lte cm-14.1) and crashes it (signal 11)
# during early boot, leaving /data unmounted and zygote unable to start.
# Encryption per device is handled in manifest.yaml disabled_features.
