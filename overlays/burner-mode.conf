# Lethe — Burner Mode configuration
# Ephemeral device: full wipe on every boot by default.
#
# User preference is stored on /persist (survives wipe).
# After startup, the user can disable burner mode from:
#   Settings > Privacy > Burner Mode
#
# On boot, the init service reads persist.lethe.burner.enabled:
#   - If true (default): wipe /data, /sdcard, reset identity, then boot clean.
#   - If false: normal boot, no wipe.

# ── Master toggle ──
# DEFAULT ON — every reboot wipes the device.
persist.lethe.burner.enabled=true

# ── User configurability ──
# Allow the user to change burner mode from Settings after boot.
persist.lethe.burner.user_configurable=true

# ── First-boot prompt ──
# Show an explanation screen on the very first boot explaining
# that burner mode is active and how to disable it.
persist.lethe.burner.first_boot_prompt=true

# ── Config storage ──
# Burner mode preference lives on /persist, which is NOT wiped.
# This ensures the user's choice survives the wipe cycle.
persist.lethe.burner.config_partition=persist

# ── Wipe scope ──
# What gets wiped on each boot when burner mode is active.
persist.lethe.burner.wipe.user_data=true
persist.lethe.burner.wipe.internal_storage=true
persist.lethe.burner.wipe.esim_profiles=true
persist.lethe.burner.wipe.wifi_credentials=true
persist.lethe.burner.wipe.bluetooth_pairings=true
persist.lethe.burner.wipe.clipboard=true
persist.lethe.burner.wipe.notification_log=true

# ── Identity rotation ──
# Generate fresh identifiers after each wipe cycle.
persist.lethe.burner.rotate.mac=true
persist.lethe.burner.rotate.android_id=true
persist.lethe.burner.rotate.device_serial=true

# ── Panic triggers ──
# Additional wipe triggers beyond the on-boot wipe.
persist.lethe.burner.trigger.panic_button=true
# Panic: press power button 5 times rapidly to instant-wipe.
persist.lethe.burner.trigger.panic_press_count=5
persist.lethe.burner.trigger.usb_signal=true
# OSmosis host can send a wipe command over USB.
persist.lethe.burner.trigger.sim_change=false
# Optional: wipe if SIM is swapped (disabled by default).
persist.lethe.burner.trigger.scheduled_wipe=false
# Optional: auto-wipe after N days (disabled by default).
persist.lethe.burner.trigger.schedule_days=0
persist.lethe.burner.trigger.dead_mans_switch=true
# Dead man's switch: missed check-in triggers escalation (lock → wipe → brick).
# Full configuration in dead-mans-switch.conf.
persist.lethe.burner.trigger.duress_pin=false
# Duress PIN: unlocks a fake session while wiping in the background.

# ── Post-wipe behavior ──
# After wipe, boot straight into a clean Android session.
persist.lethe.burner.post_wipe.action=boot_clean
# Optional decoy: show stock-looking setup wizard instead of Lethe UI.
persist.lethe.burner.post_wipe.show_decoy=false
