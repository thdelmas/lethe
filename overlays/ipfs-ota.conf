# Lethe — IPFS OTA update configuration
# The device checks for updates via IPNS channels published by OSmosis.
# Updates are fetched over IPFS (optionally through Tor) and verified
# with Ed25519 signatures before applying.
#
# No cleartext HTTP, no Google servers, no phone-home telemetry.

# ── IPNS channel ──
# OSmosis publishes signed update manifests to this IPNS key.
# The device resolves it periodically to check for new builds.
ipns_channel=lethe-updates
ipns_resolve_interval_hours=6

# ── Update verification ──
# Ed25519 public key for verifying signed manifests.
# The private key lives on the OSmosis build server, never on-device.
# Format: base64-encoded 32-byte Ed25519 public key.
trust_pubkey_file=/system/etc/lethe/update-pubkey.pem

# ── IPFS daemon ──
# Lethe runs a lightweight IPFS node for fetching updates.
# It does NOT serve content or participate in DHT routing to
# minimize metadata exposure. Receive-only mode.
ipfs_mode=client
ipfs_routing=dhtclient
ipfs_swarm_port=0
ipfs_api_port=5001
ipfs_gateway_port=0

# ── Tor routing ──
# IPFS swarm traffic goes through Tor SOCKS proxy.
# This hides the device's IP from IPFS peers.
ipfs_proxy=socks5://127.0.0.1:9050

# ── Storage ──
# IPFS repo lives on /data, wiped by burner mode.
# Pinned update packages are re-fetched after wipe if needed.
ipfs_repo=/data/lethe/ipfs
ipfs_max_storage_mb=512

# ── Update policy ──
# download: fetch update but don't install (user decides)
# prompt: fetch + show notification to install
# auto: fetch + install on next reboot (default for security patches)
update_policy=prompt
security_patch_policy=auto
