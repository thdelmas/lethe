# LETHE — Mesh Network (BLE/WiFi Direct) configuration
# Disabled by default. User enables in Settings > LETHE > Mesh Network.
#
# The mesh network enables offline signaling between trusted LETHE
# devices. Only structured signals cross the mesh — never conversation
# content. Useful for dead man's switch check-ins when internet is down.

# Master toggle
persist.lethe.mesh.enabled=false

# BLE advertising (increases battery usage)
persist.lethe.mesh.ble=true

# BLE advertising interval in ms (higher = less battery, slower discovery)
# 100ms = aggressive (high-risk situations)
# 1000ms = balanced (default)
# 5000ms = conservative (battery saver)
persist.lethe.mesh.ble_interval=1000

# WiFi Direct transport (faster than BLE, but requires WiFi radio)
persist.lethe.mesh.wifi_direct=false

# Allow this device to relay signals between other trusted peers
persist.lethe.mesh.relay_enabled=true

# Maximum trust ring size
persist.lethe.mesh.max_peers=16
