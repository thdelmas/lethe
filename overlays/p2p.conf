# LETHE — Peer Network (libp2p) configuration
# Disabled by default. User enables in Settings > LETHE > Peer Network.

# Master toggle — controls whether lethe-p2p sidecar starts
persist.lethe.p2p.enabled=false

# HTTP API port for the libp2p sidecar (localhost only)
persist.lethe.p2p.api_port=8082

# mDNS discovery (LAN only, no internet)
persist.lethe.p2p.mdns=true

# Allow incoming inference requests from peers
persist.lethe.p2p.serve_inference=true

# Maximum concurrent peer inference requests to serve
persist.lethe.p2p.max_concurrent=2
