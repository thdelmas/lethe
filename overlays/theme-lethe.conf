# Lethe — System theme overlay
# Matches the Lethe visual identity: black/red cracked glitch aesthetic.
#
# Applied as system properties + framework resource overlays.
# Works on LineageOS 14.1+ (Android 7.1+).

# ── Accent colors ──
# LineageOS accent color system (Settings > Display > Accent color)
persist.sys.theme.accent=ff_c81e1e
# Red accent matching the Lethe cracked glow (#c81e1e)

# ── Status bar ──
persist.lethe.theme.statusbar_bg=ff_080404
persist.lethe.theme.statusbar_icons=ff_c83030
# Near-black bar with dim red icons

# ── Navigation bar ──
persist.lethe.theme.navbar_bg=ff_080404
persist.lethe.theme.navbar_icons=ff_c83030

# ── System UI colors ──
persist.lethe.theme.primary=ff_080404
persist.lethe.theme.primary_dark=ff_040202
persist.lethe.theme.accent=ff_c81e1e
persist.lethe.theme.accent_light=ff_ff3c28
persist.lethe.theme.text_primary=ff_dcc8c0
persist.lethe.theme.text_secondary=ff_8a6660
persist.lethe.theme.surface=ff_1a0e0e
persist.lethe.theme.surface_variant=ff_2a1414

# ── Notification shade ──
persist.lethe.theme.notification_bg=ff_0c0606
persist.lethe.theme.quick_settings_bg=ff_100808

# ── Wallpaper ──
# Wallpaper files are installed to /system/media/
# wallpaper.png = home screen
# lockscreen.png = lock screen
persist.lethe.theme.wallpaper=lethe
