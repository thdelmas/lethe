# Lethe — System theme overlay
# Bioluminescent teal on void black. Matches the LETHE mascot
# and Terrarium Protocol design language.
#
# Applied as system properties + framework resource overlays.
# Works on LineageOS 14.1+ (Android 7.1+).

# ── Accent colors ──
# Bioluminescent teal — the living glow from the mascot's cracks
persist.sys.theme.accent=ff_22e8a0
# Teal accent matching the LETHE mascot glow (#22e8a0)

# ── Status bar ──
persist.lethe.theme.statusbar_bg=ff_080808
persist.lethe.theme.statusbar_icons=ff_22c8a0
# Near-black bar with dim teal icons

# ── Navigation bar ──
persist.lethe.theme.navbar_bg=ff_080808
persist.lethe.theme.navbar_icons=ff_22c8a0

# ── System UI colors ──
persist.lethe.theme.primary=ff_0a0a08
persist.lethe.theme.primary_dark=ff_040404
persist.lethe.theme.accent=ff_22e8a0
persist.lethe.theme.accent_light=ff_44f0b4
persist.lethe.theme.text_primary=ff_d8d4c8
persist.lethe.theme.text_secondary=ff_8a8670
persist.lethe.theme.surface=ff_141412
persist.lethe.theme.surface_variant=ff_1c1c18

# ── Notification shade ──
persist.lethe.theme.notification_bg=ff_0a0a08
persist.lethe.theme.quick_settings_bg=ff_101010

# ── Lock screen ──
# Minimal. The mascot glows faintly behind the clock.
# No shortcuts, no camera swipe, no media controls.
persist.lethe.theme.lockscreen.clock_style=stacked
persist.lethe.theme.lockscreen.shortcuts=none
persist.lethe.theme.lockscreen.camera_shortcut=false
persist.lethe.theme.lockscreen.media_controls=false
persist.lethe.theme.lockscreen.owner_info=false
persist.lethe.theme.lockscreen.charging_animation=pulse

# ── Wallpaper ──
# wallpaper.png = home screen — ghostly mascot at ~20% brightness
# lockscreen.png = lock screen — mascot at ~60% brightness
# Source: the LETHE mascot (cracked stone android with bioluminescent veins)
persist.lethe.theme.wallpaper=lethe
persist.lethe.theme.wallpaper.oled_black=true

# ── System-wide minimalism ──
persist.lethe.theme.animations_scale=0.5
persist.lethe.theme.font_weight_titles=300
persist.lethe.theme.reduce_chrome=true
