# Lethe — Dead Man's Switch
# If the user stops checking in, the device assumes compromise and acts.
#
# Configured during first boot. Settings stored on /persist so they
# survive burner-mode wipe cycles. The check-in service runs as a
# persistent background job (init.lethe-deadman.rc) with no visible
# app icon — only a silent, dismissable notification at check-in time.
#
# Threat model: device seized, owner incapacitated, or coerced.
# The switch is designed so that *not* acting is the trigger — no
# signal is ever sent outward, which means an adversary with the
# device powered off or in a Faraday cage still loses.

# ── Master toggle ──
# Disabled by default — the first-boot wizard prompts the user to
# enable it and choose their interval. Enabling is a conscious choice.
persist.lethe.deadman.enabled=false

# ── Check-in interval ──
# How often the user must prove they still control the device.
# Values: 12h, 24h, 48h, 72h, 7d
# The first-boot wizard offers these as human-readable presets:
#   "Twice a day"  → 12h    (high-risk)
#   "Once a day"   → 24h    (recommended)
#   "Every 2 days" → 48h
#   "Every 3 days" → 72h
#   "Once a week"  → 7d     (low-risk)
persist.lethe.deadman.interval=24h

# ── Check-in method ──
# How the user proves presence. Multiple can be enabled.
#
# "notification" — a silent notification appears at check-in time.
#     User taps it and enters their dead man passphrase. Notification
#     looks mundane ("System update available") to avoid suspicion.
# "unlock" — any successful device unlock counts as a check-in.
#     Simplest, but an adversary who knows the PIN can check in.
# "passphrase" — a separate passphrase, different from the lock PIN.
#     Strongest, but requires the user to remember a second secret.
#
# Default: notification + passphrase (unlock alone is too weak for
# the threat model this feature targets).
persist.lethe.deadman.method.notification=true
persist.lethe.deadman.method.unlock=false
persist.lethe.deadman.method.passphrase=true

# ── Grace period ──
# After a missed check-in, a final discreet notification is sent.
# The user has this long to respond before escalation begins.
# The notification text is deliberately bland to avoid tipping off
# anyone else looking at the screen.
persist.lethe.deadman.grace_period=4h
persist.lethe.deadman.grace_notification_text=Scheduled maintenance pending

# ── Escalation stages ──
# What happens when the dead man triggers. Stages execute in order,
# each after its own delay. This gives the user multiple chances to
# recover before the nuclear option.
#
# Stage 1 — Lock: device locks immediately, requires passphrase
#           (not PIN, not fingerprint) to unlock.
# Stage 2 — Wipe: full data wipe identical to burner-mode wipe.
#           Interval between lock and wipe gives a final window.
# Stage 3 — Brick: overwrite /persist, /boot, and recovery with
#           random bytes. Device becomes unbootable. Only OSmosis
#           USB recovery can restore it. This is the last resort.
#
persist.lethe.deadman.stage1.action=lock
persist.lethe.deadman.stage1.delay=0
persist.lethe.deadman.stage2.action=wipe
persist.lethe.deadman.stage2.delay=1h
persist.lethe.deadman.stage3.action=brick
persist.lethe.deadman.stage3.enabled=false
persist.lethe.deadman.stage3.delay=2h

# ── Duress PIN ──
# A secondary unlock code that appears to work normally but silently
# triggers an immediate Stage 2 wipe in the background while showing
# a fake home screen. The adversary sees a working phone; the data
# is already gone.
#
# Set during first boot. If left empty, duress PIN is disabled.
persist.lethe.deadman.duress_pin.enabled=false
# The actual PIN value is stored encrypted on /persist — never in
# plaintext config. This field only controls whether the feature is
# active.

# ── Heartbeat log ──
# Each successful check-in writes a timestamp to /persist. This lets
# the init service calculate time-since-last-checkin on boot, which
# matters because the device may have been powered off to stall the
# timer. On boot, if (now − last_checkin) > interval + grace, the
# switch triggers immediately before userspace starts.
#
# The clock source is the hardware RTC, not network time, so pulling
# the SIM or disabling WiFi doesn't help an adversary.
persist.lethe.deadman.heartbeat_path=/persist/lethe/deadman/last_checkin
persist.lethe.deadman.clock_source=rtc

# ── Power-off protection ──
# If the device is powered off or rebooted, the dead man timer keeps
# ticking (based on RTC). On next boot, the init service checks
# elapsed time since last check-in BEFORE mounting /data.
# An adversary cannot stall the timer by keeping the device off.
persist.lethe.deadman.enforce_on_boot=true

# ── Trusted environments (optional) ──
# Locations or networks where the timer pauses. Disabled by default
# because location/network trust is fragile and expands attack surface.
persist.lethe.deadman.trusted_wifi=false
persist.lethe.deadman.trusted_location=false
