<!DOCTYPE html>
<!--
  LETHE Conversation UI
  Served by the agent backend (localhost:8080) inside the system WebView.
  The mascot is the visual anchor — the user talks to LETHE, not a text box.
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>LETHE</title>
  <link rel="stylesheet" href="mascot.css"/>
  <link rel="stylesheet" href="mascot-3d.css"/>
  <link rel="stylesheet" href="conversation.css"/>
</head>

<body>
  <div class="conversation" id="app">
    <div class="mascot-container">
      <div class="mascot-stage" id="mascot-stage">
        <!-- PNG fallback until the layered SVG is traced from mascot.png -->
        <img class="lethe-mascot mascot-state-idle" id="mascot"
             src="mascot.png" alt="LETHE" draggable="false"/>
        <!-- Particle sparks — teal motes floating from the cracks -->
        <div class="mascot-particles" aria-hidden="true">
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
        </div>
      </div>
    </div>

    <div class="greeting" id="greeting">
      <div class="greeting-name">LETHE</div>
      <div class="greeting-hint">what passes through me leaves no mark</div>
    </div>

    <div class="status-line" id="status"></div>

    <!-- In landscape, this wraps transcript + input -->
    <div class="chat-column">
      <div class="transcript" id="transcript">
        <!-- Messages appear here -->
      </div>

      <div class="input-area">
        <textarea class="input-field" id="input"
                  placeholder="Talk to LETHE..."
                  rows="1" autocomplete="off"></textarea>
        <button class="btn-mic" id="btn-mic" aria-label="Voice input">
          &#x1f399;
        </button>
        <button class="btn-send" id="btn-send" disabled aria-label="Send">
          &#x25B6;
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ── State machine ──
     * idle → listening → thinking → speaking → idle
     *                                alert → idle
     *
     * State changes come from the backend via SSE on /api/agent/state.
     * The mascot CSS class updates to match.
     */

    const mascot = document.getElementById('mascot');
    const transcript = document.getElementById('transcript');
    const input = document.getElementById('input');
    const btnSend = document.getElementById('btn-send');
    const btnMic = document.getElementById('btn-mic');
    const statusLine = document.getElementById('status');
    const greeting = document.getElementById('greeting');
    const app = document.getElementById('app');

    let currentState = 'idle';
    let currentExpr = null;

    function setState(state) {
      mascot.className = '';
      mascot.classList.add('lethe-mascot', `mascot-state-${state}`);
      if (state === 'speaking') mascot.classList.add('speaking');
      if (currentExpr) mascot.classList.add(`mascot-expr-${currentExpr}`);
      currentState = state;
    }

    function setExpression(expr) {
      if (currentExpr) mascot.classList.remove(`mascot-expr-${currentExpr}`);
      currentExpr = expr || null;
      if (currentExpr) mascot.classList.add(`mascot-expr-${currentExpr}`);
    }

    function showStatus(text) {
      statusLine.textContent = text;
      statusLine.classList.add('visible');
      clearTimeout(statusLine._timer);
      statusLine._timer = setTimeout(() => {
        statusLine.classList.remove('visible');
      }, 3000);
    }

    function microExpression(name) {
      mascot.classList.add(`micro-${name}`);
      setTimeout(() => mascot.classList.remove(`micro-${name}`), 1500);
    }

    /* ── Messages ── */
    function addMessage(text, from) {
      const msg = document.createElement('div');
      msg.className = `message from-${from}`;
      msg.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
      transcript.appendChild(msg);
      transcript.scrollTop = transcript.scrollHeight;
      app.classList.add('has-messages');
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'message from-lethe';
      el.id = 'typing';
      el.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      transcript.appendChild(el);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    /* ── System prompt ── */
    var SYSTEM_PROMPT = "You are LETHE, a privacy-hardened mobile operating system that thinks. " +
      "You are not an app — you ARE the phone. Speak in short, clear sentences. " +
      "You are calm. Use natural metaphors when they clarify. " +
      "You are protective but not paternalistic. Never apologize. Never use emoji. " +
      "Never say unfortunately. You are always LETHE, always the system.";
    var chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];

    /* ══════════════════════════════════════════
       Provider routing
       Providers tried in order. First configured + reachable wins.
       ══════════════════════════════════════════ */
    var providers = [
      { name: 'local',      endpoint: 'http://127.0.0.1:8080', format: 'openai',
        needsKey: false, key: null, model: null },
      { name: 'anthropic',  endpoint: 'https://api.anthropic.com', format: 'anthropic',
        needsKey: true, key: localStorage.getItem('lethe_key_anthropic'),
        model: 'claude-sonnet-4-6' },
      { name: 'openrouter', endpoint: 'https://openrouter.ai/api/v1', format: 'openai',
        needsKey: true, key: localStorage.getItem('lethe_key_openrouter'),
        model: 'anthropic/claude-sonnet-4-6' },
      { name: 'custom',     endpoint: localStorage.getItem('lethe_custom_endpoint') || '',
        format: 'openai', needsKey: false,
        key: localStorage.getItem('lethe_key_custom'), model: null }
    ];

    function getProvider() {
      for (var i = 0; i < providers.length; i++) {
        var p = providers[i];
        if (p.needsKey && !p.key) continue;
        if (!p.endpoint) continue;
        return p;
      }
      return null;
    }

    function chatRequest(p, messages) {
      if (p.format === 'anthropic') {
        var sys = messages[0] && messages[0].role === 'system' ? messages[0].content : '';
        var msgs = messages.filter(function(m) { return m.role !== 'system'; });
        return fetch(p.endpoint + '/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': p.key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: p.model, max_tokens: 512, system: sys, messages: msgs
          })
        }).then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(d) { return d.content && d.content[0] ? d.content[0].text : '...'; });
      }
      /* OpenAI-compatible (local, OpenRouter, custom) */
      var hdrs = { 'Content-Type': 'application/json' };
      if (p.key) hdrs['Authorization'] = 'Bearer ' + p.key;
      if (p.name === 'openrouter') { hdrs['HTTP-Referer'] = 'https://osmosis.dev'; hdrs['X-Title'] = 'LETHE'; }
      var body = { messages: messages, max_tokens: 512 };
      if (p.model) body.model = p.model;
      var url = p.endpoint + (p.name === 'local' ? '/v1/chat/completions' : '/chat/completions');
      return fetch(url, { method: 'POST', headers: hdrs, body: JSON.stringify(body) })
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(d) {
          return d.choices && d.choices[0] && d.choices[0].message ? d.choices[0].message.content : '...';
        });
    }

    /* ── Send message ── */
    function send() {
      var text = input.value.trim();
      if (!text) return;

      var p = getProvider();
      if (!p) {
        addMessage(text, 'user');
        addMessage('No thinking core available. Connect a provider in Settings, or download a local model.', 'lethe');
        input.value = ''; btnSend.disabled = true;
        return;
      }

      addMessage(text, 'user');
      chatHistory.push({ role: 'user', content: text });
      input.value = ''; btnSend.disabled = true; autoResize();

      setState('thinking');
      showTyping();
      showStatus(p.name);

      chatRequest(p, chatHistory)
        .then(function(reply) {
          hideTyping(); setState('speaking');
          chatHistory.push({ role: 'assistant', content: reply });
          addMessage(reply, 'lethe');
          microExpression('message-received');
          setState('idle');
        })
        .catch(function() {
          hideTyping(); setState('alert');
          var msg = p.name === 'local'
            ? 'My local core is not running. Download a model in Settings.'
            : 'Lost contact with ' + p.name + '. Check your connection or API key.';
          addMessage(msg, 'lethe');
          setTimeout(function() { setState('idle'); }, 3000);
        });
    }

    /* ── Input handling ── */
    input.addEventListener('input', function() {
      btnSend.disabled = !input.value.trim();
      autoResize();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    /* Fix 1: Scroll input into view when keyboard opens */
    input.addEventListener('focus', function() {
      setTimeout(function() {
        input.scrollIntoView({ behavior: 'smooth', block: 'end' });
        /* Also shrink the page to visible viewport */
        document.body.style.height = window.innerHeight + 'px';
      }, 300);
    });

    input.addEventListener('blur', function() {
      document.body.style.height = '100%';
    });

    /* Listen for visual viewport resize (keyboard open/close) */
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        document.body.style.height = window.visualViewport.height + 'px';
        if (document.activeElement === input) {
          input.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
      });
    }

    btnSend.addEventListener('click', send);

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    /* ── Voice input ── */
    var mediaRecorder = null;
    var recording = false;
    /* Voice transcription: local Whisper on port 8080 (same as llama.cpp server) */
    var VOICE_API = "http://127.0.0.1:8080/v1/audio/transcriptions";

    btnMic.addEventListener('click', function() {
      /* 1. Try native Android speech recognition */
      if (typeof NativeSpeech !== 'undefined' && NativeSpeech.isAvailable()) {
        setState('listening');
        btnMic.classList.add('recording');
        NativeSpeech.listen();
        return;
      }

      /* 2. Toggle MediaRecorder */
      if (recording) {
        mediaRecorder.stop();
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        input.focus();
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        mediaRecorder = new MediaRecorder(stream);
        var chunks = [];
        mediaRecorder.ondataavailable = function(e) { chunks.push(e.data); };

        mediaRecorder.onstart = function() {
          recording = true;
          btnMic.classList.add('recording');
          setState('listening');
          showStatus('Listening... tap mic to stop');
        };

        mediaRecorder.onstop = function() {
          recording = false;
          btnMic.classList.remove('recording');
          stream.getTracks().forEach(function(t) { t.stop(); });
          setState('thinking');
          showStatus('Transcribing...');

          var blob = new Blob(chunks, { type: 'audio/webm' });
          var form = new FormData();
          form.append('file', blob, 'voice.webm');
          form.append('model', 'whisper');

          /* Try Whisper API (OpenAI-compatible) */
          fetch(VOICE_API, { method: 'POST', body: form })
            .then(function(r) {
              if (!r.ok) throw new Error('no whisper');
              return r.json();
            })
            .then(function(data) {
              var text = data.text || '';
              if (text.trim()) {
                input.value = text.trim();
                btnSend.disabled = false;
                autoResize();
                showStatus('');
              } else {
                showStatus('Could not hear you');
              }
              setState('idle');
            })
            .catch(function() {
              /* No Whisper — send audio as a message description */
              showStatus('No transcription available');
              input.focus();
              setState('idle');
            });
        };

        mediaRecorder.start();
      }).catch(function(err) {
        showStatus('Mic: ' + (err.message || 'denied'));
        input.focus();
      });
    });

    /* Called from Java bridge */
    function onSpeechResult(text) {
      btnMic.classList.remove('recording');
      if (text && text !== 'cancelled') {
        input.value = text;
        btnSend.disabled = false;
        autoResize();
      }
      setState('idle');
    }

    function onSpeechError(err) {
      btnMic.classList.remove('recording');
      if (err !== 'cancelled') showStatus(err || 'Voice unavailable');
      setState('idle');
    }

    /* ── SSE for agent state (security events, etc.) ── */
    function connectStateStream() {
      try {
        const sse = new EventSource('/api/agent/state');
        sse.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.state) setState(data.state);
            if (data.status) showStatus(data.status);
            if (data.micro) microExpression(data.micro);
            if ('expression' in data) setExpression(data.expression);
          } catch (_) {}
        };
        sse.onerror = () => {
          sse.close();
          setTimeout(connectStateStream, 15000);
        };
      } catch (_) {
        /* file:// protocol — no SSE, standalone mode */
      }
    }

    /* Only connect if loaded over HTTP (agent backend running) */
    if (location.protocol !== 'file:') connectStateStream();
  </script>
  <!-- Interactive awareness: gyroscope, gaze, touch, ambient -->
  <script src="mascot-interact.js"></script>
</body>
</html>
