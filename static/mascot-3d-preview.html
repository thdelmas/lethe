<!DOCTYPE html>
<!--
  LETHE Mascot 3D Preview
  Loads mascot.glb and plays all animations simultaneously.
  Orbit controls for inspection. Dark background matching LETHE theme.
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>LETHE — 3D Mascot Preview</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #080808; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 12px; left: 12px;
      color: #22e8a0; font: 11px monospace; opacity: 0.5;
    }
  </style>
</head>
<body>
  <div id="info">LETHE guardian — drag to orbit, scroll to zoom</div>

  <!-- Three.js from CDN (ES module) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080808);

    // Camera
    const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 3);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // Lighting
    const ambient = new THREE.AmbientLight(0x222222, 0.8);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(2, 3, 2);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x22e8a0, 0.4);
    fill.position.set(-2, 1, -1);
    scene.add(fill);

    // Teal rim light from below
    const rim = new THREE.PointLight(0x22e8a0, 0.6, 5);
    rim.position.set(0, -0.5, 1);
    scene.add(rim);

    // Floor glow
    const floorGeo = new THREE.CircleGeometry(1.5, 32);
    const floorMat = new THREE.MeshBasicMaterial({
      color: 0x22e8a0, transparent: true, opacity: 0.03
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.05;
    scene.add(floor);

    // Load mascot
    const loader = new GLTFLoader();
    const mixers = [];

    loader.load('mascot.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);

      // Play all animations simultaneously
      if (gltf.animations.length > 0) {
        const mixer = new THREE.AnimationMixer(model);
        mixers.push(mixer);
        for (const clip of gltf.animations) {
          const action = mixer.clipAction(clip);
          action.play();
        }
        console.log(`Playing ${gltf.animations.length} animations:`,
          gltf.animations.map(a => a.name));
      }

      // Log skeleton
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
        }
      });

      console.log('Model loaded:', gltf);
    }, undefined, (err) => {
      console.error('Failed to load mascot.glb:', err);
    });

    // Animate
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      for (const m of mixers) m.update(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
