<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; }
  body { background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
  var W = 360, H = 480;
  var params = new URLSearchParams(location.search);
  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;
  document.body.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(35, W / H, 0.01, 50);
  camera.position.set(0, 0.05, 3.0);
  camera.lookAt(0, 0.05, 0);

  scene.add(new THREE.AmbientLight(0x222222, 0.8));
  var key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(2, 3, 2);
  scene.add(key);
  var fill = new THREE.DirectionalLight(0x22e8a0, 0.4);
  fill.position.set(-2, 1, -1);
  scene.add(fill);
  var rim = new THREE.PointLight(0x22e8a0, 0.6, 5);
  rim.position.set(0, -0.2, 0.8);
  scene.add(rim);

  var mixers = [];
  var loader = new THREE.GLTFLoader();
  loader.load('mascot-taproot.glb', function(gltf) {
    var rotDeg = parseFloat(params.get('rot') || '110');
    gltf.scene.rotation.y = rotDeg * Math.PI / 180;

    // Auto-center the model
    var box = new THREE.Box3().setFromObject(gltf.scene);
    var center = box.getCenter(new THREE.Vector3());
    gltf.scene.position.sub(center);
    gltf.scene.position.y += (box.max.y - box.min.y) * 0.05; // slight upward nudge

    scene.add(gltf.scene);

    if (gltf.animations.length > 0) {
      var mixer = new THREE.AnimationMixer(gltf.scene);
      mixers.push(mixer);
      var animIdx = parseInt(params.get('anim') || '2');
      if (animIdx >= 0 && animIdx < gltf.animations.length) {
        var action = mixer.clipAction(gltf.animations[animIdx]);
        action.setLoop(THREE.LoopRepeat);
        action.play();
      }
    }

    // Glow mode: pulse emissive teal for listening/processing anims
    if (params.get('glow') === '1') {
      gltf.scene.traverse(function(child) {
        if (child.isMesh && child.material) {
          child.material.emissive = new THREE.Color(0x22e8a0);
          child.material.emissiveIntensity = 0;
          window._glowMaterials = window._glowMaterials || [];
          window._glowMaterials.push(child.material);
        }
      });
    }

    window._modelLoaded = true;
  });

  var clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    var dt = clock.getDelta();
    var t = clock.getElapsedTime();
    for (var i = 0; i < mixers.length; i++) mixers[i].update(dt);
    if (window._glowMaterials) {
      var intensity = 0.15 + 0.25 * Math.sin(t * 2.5);
      for (var j = 0; j < window._glowMaterials.length; j++) {
        window._glowMaterials[j].emissiveIntensity = intensity;
      }
    }
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
