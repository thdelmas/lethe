<!DOCTYPE html>
<!--
  LETHE Home Screen Mascot
  A miniature animated presence on the Void launcher home screen.
  Tap to open the full LETHE conversation.

  This is NOT the full chat UI — just the breathing, blinking mascot.
  Loaded in a small floating WebView overlay (64dp) positioned below the clock.
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>LETHE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #22e8a0;
      --red: #ff4444;
    }

    html, body {
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 3D Stage ── */
    .mascot-stage {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 600px;
      perspective-origin: 50% 45%;
      position: relative;
    }

    /* ── Mascot ── */
    .mascot {
      width: 80%;
      height: 80%;
      object-fit: contain;
      transform-style: preserve-3d;
      transform-origin: 50% 48%;
      animation: home-sway 8s ease-in-out infinite,
                 home-breathe 6s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(34, 232, 160, 0.15));
      cursor: pointer;
      /* Gyroscope driven via JS */
      --gyro-x: 0deg;
      --gyro-y: 0deg;
      --ambient-brightness: 1;
    }

    .mascot.gyro-active {
      transform: rotateX(var(--gyro-x)) rotateY(var(--gyro-y));
      transition: transform 0.15s ease-out;
    }

    .mascot.ambient-active {
      filter: drop-shadow(0 0 12px rgba(34, 232, 160, 0.15))
              brightness(var(--ambient-brightness));
    }

    /* ── Idle animations ── */
    @keyframes home-sway {
      0%, 100% { transform: rotateY(-1deg) rotateZ(-0.3deg); }
      50%      { transform: rotateY(1deg) rotateZ(0.3deg); }
    }

    @keyframes home-breathe {
      0%, 100% { transform: rotateX(0.3deg) scale(1); }
      50%      { transform: rotateX(-0.3deg) scale(1.02); }
    }

    /* ── Tap reaction ── */
    .tap-react {
      animation: tap-bounce 0.3s ease !important;
    }

    @keyframes tap-bounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.88) rotateX(3deg); }
      60%  { transform: scale(1.05) rotateX(-1deg); }
      100% { transform: scale(1); }
    }

    /* ── Glow ring — subtle halo behind the mascot ── */
    .glow-ring {
      position: absolute;
      width: 90%;
      height: 90%;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(34, 232, 160, 0.08) 0%,
        rgba(34, 232, 160, 0.03) 50%,
        transparent 70%
      );
      animation: glow-pulse 3.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.08); }
    }

    /* ── Particle sparks — fewer and smaller for home screen ── */
    .spark {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
      animation: spark-float var(--dur, 4s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      left: var(--x, 50%);
      bottom: var(--y, 30%);
    }

    @keyframes spark-float {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0.5); }
      15%  { opacity: 0.5; }
      50%  { opacity: 0.3; transform: translateY(-20px) translateX(var(--drift, 4px)) scale(0.8); }
      100% { opacity: 0; transform: translateY(-40px) translateX(var(--drift, 4px)) scale(0.2); }
    }

    .spark:nth-child(1) { --x: 35%; --y: 40%; --dur: 3.5s; --delay: 0s;   --drift: 4px; }
    .spark:nth-child(2) { --x: 60%; --y: 35%; --dur: 4.2s; --delay: 1.2s; --drift: -5px; }
    .spark:nth-child(3) { --x: 45%; --y: 55%; --dur: 3.8s; --delay: 2.5s; --drift: 6px; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .mascot { animation: none !important; transform: none !important; }
      .glow-ring { animation: none; opacity: 0.5; }
      .spark { animation: none !important; opacity: 0 !important; }
    }
  </style>
</head>

<body>
  <div class="mascot-stage" id="stage">
    <div class="glow-ring"></div>
    <img class="mascot" id="mascot" src="mascot.png" alt="LETHE" draggable="false"/>
    <div class="spark" aria-hidden="true"></div>
    <div class="spark" aria-hidden="true"></div>
    <div class="spark" aria-hidden="true"></div>
  </div>

  <script>
    var mascot = document.getElementById('mascot');
    var stage = document.getElementById('stage');

    /* ── Tap → open LETHE conversation ── */
    stage.addEventListener('click', function() {
      mascot.classList.add('tap-react');
      setTimeout(function() { mascot.classList.remove('tap-react'); }, 300);

      /* Open the full LETHE conversation activity */
      setTimeout(function() {
        if (typeof NativeLauncher !== 'undefined') {
          NativeLauncher.openAgent();
        } else {
          /* Fallback: intent URI for the assist activity */
          window.location.href = 'intent:#Intent;' +
            'component=org.osmosis.lethe.agent/.LetheAssistActivity;end';
        }
      }, 150);
    });

    /* ── Gyroscope ── */
    var gyroEnabled = false;
    var gyroBeta0 = 0;
    var gyroGamma0 = 0;

    function initGyro() {
      if (gyroEnabled) return;
      window.addEventListener('deviceorientation', function(e) {
        if (e.beta === null) return;
        if (!gyroEnabled) {
          gyroEnabled = true;
          gyroBeta0 = e.beta;
          gyroGamma0 = e.gamma;
          mascot.classList.add('gyro-active');
        }
        var rx = Math.max(-6, Math.min(6, (e.beta - gyroBeta0) * 0.25));
        var ry = Math.max(-6, Math.min(6, (e.gamma - gyroGamma0) * 0.25));
        mascot.style.setProperty('--gyro-x', rx + 'deg');
        mascot.style.setProperty('--gyro-y', ry + 'deg');
      });
    }

    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.addEventListener('touchstart', function req() {
        DeviceOrientationEvent.requestPermission().then(function(r) {
          if (r === 'granted') initGyro();
        }).catch(function() {});
        document.removeEventListener('touchstart', req);
      }, { once: true });
    } else {
      initGyro();
    }

    /* ── Ambient: battery brightness ── */
    if (navigator.getBattery) {
      navigator.getBattery().then(function(bat) {
        var b = 0.5 + (bat.level * 0.5);
        mascot.style.setProperty('--ambient-brightness', b);
        mascot.classList.add('ambient-active');
        bat.addEventListener('levelchange', function() {
          mascot.style.setProperty('--ambient-brightness', 0.5 + bat.level * 0.5);
        });
      });
    }
  </script>
</body>
</html>
