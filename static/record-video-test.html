<!DOCTYPE html>
<html><head><meta charset="utf-8"/>
<style>*{margin:0}body{background:#080808;overflow:hidden}</style>
</head><body>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
var params = new URLSearchParams(location.search);
var renderer = new THREE.WebGLRenderer({antialias:false, alpha:false});
renderer.setSize(480,480);
renderer.setClearColor(0x080808,1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.0;
document.body.appendChild(renderer.domElement);

// Post-processing: selective hue shift targeting cyan/teal only
// We'll render to a texture, then apply a custom shader
var renderTarget = new THREE.WebGLRenderTarget(480, 480);

var hueShiftMaterial = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: null },
    targetHue: { value: 0.48 },     // cyan/teal ≈ 0.48 in 0-1 hue space
    hueRange: { value: 0.12 },      // how wide the target range is
    hueShift: { value: 0.0 },       // how much to shift (0-1)
    satBoost: { value: 1.0 }
  },
  vertexShader: [
    'varying vec2 vUv;',
    'void main() {',
    '  vUv = uv;',
    '  gl_Position = vec4(position, 1.0);',
    '}'
  ].join('\n'),
  fragmentShader: [
    'uniform sampler2D tDiffuse;',
    'uniform float targetHue;',
    'uniform float hueRange;',
    'uniform float hueShift;',
    'uniform float satBoost;',
    'varying vec2 vUv;',
    '',
    'vec3 rgb2hsv(vec3 c) {',
    '  vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);',
    '  vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));',
    '  vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));',
    '  float d = q.x - min(q.w, q.y);',
    '  float e = 1.0e-10;',
    '  return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);',
    '}',
    '',
    'vec3 hsv2rgb(vec3 c) {',
    '  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);',
    '  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);',
    '  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);',
    '}',
    '',
    'void main() {',
    '  vec4 color = texture2D(tDiffuse, vUv);',
    '  vec3 hsv = rgb2hsv(color.rgb);',
    '',
    '  // How close is this pixel to the target hue?',
    '  float hueDist = abs(hsv.x - targetHue);',
    '  hueDist = min(hueDist, 1.0 - hueDist); // wrap around',
    '  float hueMask = smoothstep(hueRange, hueRange * 0.3, hueDist);',
    '',
    '  // Saturated teal pixels',
    '  float satMask = smoothstep(0.05, 0.15, hsv.y);',
    '',
    '  // Bright low-saturation pixels (white/grey glow from inner lights)',
    '  float brightMask = smoothstep(0.3, 0.5, hsv.z) * smoothstep(0.35, 0.05, hsv.y);',
    '',
    '  // Combine: teal hue OR bright glow',
    '  float mask = max(hueMask * satMask, brightMask);',
    '',
    '  // Apply hue shift only to masked pixels',
    '  hsv.x = fract(hsv.x + hueShift * mask);',
    '  hsv.y *= 1.0 + (satBoost - 1.0) * mask;',
    '',
    '  gl_FragColor = vec4(hsv2rgb(hsv), color.a);',
    '}'
  ].join('\n')
});

var quadGeo = new THREE.PlaneGeometry(2, 2);
var quadMesh = new THREE.Mesh(quadGeo, hueShiftMaterial);
var quadScene = new THREE.Scene();
quadScene.add(quadMesh);
var quadCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// Mood = hue shift amount (in 0-1 space)
// Cyan/teal is at ~0.48. Green moss is at ~0.33.
// We target 0.48 with range 0.12, so 0.36-0.60 gets shifted. Moss at 0.33 is outside.
// Hue space: teal=0.48, green=0.33, blue=0.58, purple=0.75, red=0.0, yellow=0.16
// To reach target from 0.48: shift = target - 0.48
var moodShifts = {
  green:  { shift: -0.15, sat: 1.5 },   // 0.48→0.33 green
  blue:   { shift: 0.12,  sat: 1.5 },   // 0.48→0.60 blue (less purple)
  yellow: { shift: -0.32, sat: 2.0 },   // 0.48→0.16 yellow
  red:    { shift: 0.52,  sat: 2.5 },   // 0.48→1.0→0.0 red (go the other way around)
  purple: { shift: 0.27,  sat: 1.5 },   // 0.48→0.75 purple
  white:  { shift: 0.0,   sat: 0.1 }    // desaturate teal only
};
var mood = params.get('mood') || 'green';
var ms = moodShifts[mood] || moodShifts.green;
hueShiftMaterial.uniforms.hueShift.value = ms.shift;
hueShiftMaterial.uniforms.satBoost.value = ms.sat;

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(35,1,0.01,50);
scene.add(new THREE.AmbientLight(0x444444,1.0));
var kl=new THREE.DirectionalLight(0xffffff,1.5);kl.position.set(2,3,2);scene.add(kl);
var fl=new THREE.DirectionalLight(0xcccccc,0.8);fl.position.set(-2,1,-1);scene.add(fl);
var ol=new THREE.PointLight(0x22e8a0,2.0,0.8);scene.add(ol);
var cl=new THREE.PointLight(0x22e8a0,1.5,0.6);scene.add(cl);
var hl=new THREE.PointLight(0x22e8a0,1.0,0.4);scene.add(hl);

var mixer;
var loader=new THREE.GLTFLoader();
loader.load('mascot-taproot.glb',function(gltf){
  gltf.scene.rotation.y=285*Math.PI/180;
  var box=new THREE.Box3().setFromObject(gltf.scene);
  var c=box.getCenter(new THREE.Vector3());
  var s=box.getSize(new THREE.Vector3());
  gltf.scene.position.set(-c.x,-box.min.y,-c.z);
  camera.position.set(0,s.y*0.45,s.x*2.5);
  camera.lookAt(0,s.y*0.4,0);
  ol.position.set(0,s.y*0.55,0.02);
  cl.position.set(0,s.y*0.35,0.02);
  hl.position.set(0,s.y*0.80,0.02);
  scene.add(gltf.scene);
  mixer=new THREE.AnimationMixer(gltf.scene);
  var animIdx=parseInt(params.get('anim')||'24');
  // Play initial animation
  var pingpong = params.get('pingpong') === '1';
  if(animIdx < gltf.animations.length){
    var action = mixer.clipAction(gltf.animations[animIdx]);
    action.setLoop(pingpong ? THREE.LoopPingPong : THREE.LoopRepeat);
    action.play();
  }

  // Expose API for switching animations mid-recording
  window._mixer = mixer;
  window._anims = gltf.animations;
  window._currentAction = action;
  window.switchAnim = function(idx) {
    if(window._currentAction) window._currentAction.fadeOut(0.5);
    var newAction = mixer.clipAction(gltf.animations[idx]);
    newAction.reset().fadeIn(0.5).setLoop(THREE.LoopRepeat).play();
    window._currentAction = newAction;
  };

  window._ready=true;
});

var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var dt=clock.getDelta();var t=clock.getElapsedTime();
  var speed=parseFloat(params.get('speed')||'0.3');
  if(mixer)mixer.update(dt*speed);
  var g=0.5+0.5*Math.sin(t*Math.PI/7.5);
  ol.intensity=2.0*(0.7+0.15*g);
  cl.intensity=1.5*(0.7+0.15*g);
  hl.intensity=1.0*(0.7+0.15*g);

  // Render scene to texture
  renderer.setRenderTarget(renderTarget);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);

  // Apply selective hue shift and render to screen
  hueShiftMaterial.uniforms.tDiffuse.value = renderTarget.texture;
  renderer.render(quadScene, quadCam);
}
animate();
</script>
</body></html>
