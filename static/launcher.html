<!DOCTYPE html>
<!--
  LETHE — Void Launcher
  One page IS the home screen + conversation. One WebView. One entity.
  Works offline. Works without agent (clock + mascot + gestures).

  Avatar tiers (user-selectable in Settings, auto-detected by default):
    3d       — WebGL GLB model (new devices)
    2d       — PNG with CSS transforms + particles (old devices)
    static   — just the PNG, no animation (ultra low-end)
-->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>LETHE</title>
  <link rel="stylesheet" href="launcher.css"/>
  <link rel="stylesheet" href="settings.css"/>
</head>

<body>
  <!-- ══════ HOME SCREEN ══════ -->
  <div class="home" id="home">
    <div class="clock">
      <div class="clock-hours" id="clock-h">00</div>
      <span class="clock-dot"></span>
      <div class="clock-minutes" id="clock-m">00</div>
      <div class="clock-date" id="clock-date"></div>
    </div>

    <div class="home-mascot" id="home-mascot">
      <!-- 3D: WebGL canvas (hidden if not 3d tier) -->
      <canvas id="mascot-canvas" class="mascot-layer mascot-3d"></canvas>

      <!-- 2D: canvas-driven video with crossfade -->
      <div class="mascot-layer mascot-2d" style="display:none">
        <div class="glow-ring"></div>
        <canvas id="mascot-canvas-2d" class="mascot-2d-img"></canvas>
        <video id="vid-a" muted playsinline style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px"></video>
        <video id="vid-b" muted playsinline style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px"></video>
      </div>

      <!-- Static: just the image, no animation -->
      <img src="mascot.png" alt="LETHE" draggable="false"
           class="mascot-layer mascot-static" style="display:none"/>
    </div>

    <div class="home-hint" id="hint">tap the guardian</div>
  </div>

  <!-- ══════ DEV PANEL (long-press clock to open) ══════ -->
  <div class="dev-panel" id="dev-panel" style="display:none">
    <div class="dev-header">
      <span>Settings</span>
      <button id="dev-close" class="dev-btn">&times;</button>
    </div>
    <div class="dev-section">
      <label>Animation</label>
      <select id="dev-anim">
        <option value="idle">0: idle (60s)</option>
        <option value="warmup">1: warmup (8s)</option>
        <option value="thinking">2: thinking (12s)</option>
        <option value="listening">3: listening (10s)</option>
        <option value="speaking">4: speaking (10s)</option>
        <option value="nod">5: nod (3s)</option>
        <option value="deny">6: deny (3s)</option>
        <option value="wave">7: wave (4s)</option>
        <option value="alert">8: alert (2.5s)</option>
        <option value="confirm">9: confirm (3s)</option>
        <option value="sleep">10: sleep (5s)</option>
        <option value="wake">11: wake (4s)</option>
      </select>
    </div>
    <div class="dev-section">
      <label>Speed: <span id="dev-speed-val">1.0x</span></label>
      <input type="range" id="dev-speed" min="0.1" max="3" step="0.1" value="1"/>
    </div>
    <div class="dev-section">
      <label>Rotation: <span id="dev-rot-val">285&deg;</span></label>
      <input type="range" id="dev-rot" min="0" max="360" step="5" value="285"/>
    </div>
    <div class="dev-section">
      <label>Mood</label>
      <select id="dev-mood">
        <option value="green">green (calm)</option>
        <option value="blue">blue (thinking)</option>
        <option value="yellow">yellow (alert)</option>
        <option value="red">red (error)</option>
      </select>
    </div>
    <div class="dev-section">
      <label>Tier: <span id="dev-tier-info">—</span></label>
      <div class="dev-row">
        <button class="dev-btn" data-tier="3d">3D</button>
        <button class="dev-btn" data-tier="2d">2D</button>
        <button class="dev-btn" data-tier="static">Static</button>
      </div>
    </div>
    <div class="dev-info" id="dev-info"></div>
    <div class="dev-section">
      <label>Configuration</label>
      <div class="dev-row">
        <button class="dev-btn" id="btn-settings">Provider &amp; Model</button>
      </div>
    </div>
    <div class="dev-section">
      <label>Help &amp; Feedback</label>
      <div class="dev-row">
        <button class="dev-btn" id="btn-report-issue">&#x1F41B; Report Issue</button>
        <button class="dev-btn" id="btn-discord">&#x1F4AC; Discord</button>
      </div>
    </div>
  </div>

  <!-- ══════ SETTINGS PANEL ══════ -->
  <div class="settings-panel" id="settings-panel" style="display:none">
    <div class="dev-header">
      <span>Providers</span>
      <button id="settings-close" class="dev-btn">&times;</button>
    </div>
    <div class="settings-desc">
      Enter your keys below, or scan a QR code from OSmosis.
      LETHE tries local first, then cloud.
    </div>
    <div class="dev-section">
      <button class="dev-btn" id="set-scan-qr"
              style="width:100%;padding:0.6rem">Scan QR from OSmosis</button>
    </div>
    <div id="settings-providers"></div>
    <div class="dev-section">
      <button class="dev-btn" id="set-save">Save</button>
      <span id="set-status" style="margin-left:0.5rem;font-size:11px;color:var(--accent)"></span>
    </div>
  </div>

  <!-- ══════ PRIVACY STATUS BAR (persistent, bottom of home screen) ══════ -->
  <div class="privacy-bar" id="privacy-bar">
    <span class="privacy-tor" id="privacy-tor">&#x1f6e1; Tor</span>
    <span class="privacy-sep"></span>
    <span class="privacy-trackers" id="privacy-trackers"></span>
  </div>

  <!-- ══════ BURNER WARNING (persistent banner when burner mode active) ══════ -->
  <div class="burner-banner" id="burner-banner" style="display:none">
    <span class="burner-icon">&#x26a0;</span>
    Burner mode — photos, files, and data are erased on reboot
    <button id="burner-dismiss" class="burner-close">&times;</button>
  </div>

  <!-- ══════ APP DRAWER (slides up on swipe) ══════ -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <input class="drawer-search" id="drawer-search" type="text"
           placeholder="Search apps..." autocomplete="off"/>
    <div class="drawer-list" id="drawer-list"></div>
  </div>

  <!-- ══════ CHAT (slides up) ══════ -->
  <div class="chat" id="chat">
    <div class="chat-header">
      <div class="chat-mascot">
        <canvas id="chat-mascot-canvas" class="chat-3d"></canvas>
        <img src="mascot.png" alt="LETHE" draggable="false"
             class="chat-2d" style="display:none"/>
      </div>
      <button class="chat-settings-btn" id="chat-settings-btn"
              aria-label="Settings">&#x2699;</button>
    </div>
    <div class="chat-status" id="status"></div>
    <div class="transcript" id="transcript"></div>
    <div class="input-area">
      <input class="input-field" id="input" type="text" placeholder="Talk to LETHE..."
             autocomplete="off"/>
      <button class="btn btn-mic" id="btn-mic" aria-label="Voice">&#x1f399;</button>
      <button class="btn btn-send" id="btn-send" disabled aria-label="Send">&#x25B6;</button>
    </div>
  </div>

  <!-- Tier selection: auto-detect, user-overridable in Settings -->
  <script src="mascot-tier.js"></script>

  <!-- 3D tier loads Three.js only if needed -->
  <script>
    if (window.letheTier === '3d') {
      document.write('<script src="three.min.js"><\/script>');
      document.write('<script src="GLTFLoader.js"><\/script>');
    }
  </script>

  <script src="sprite-player.js"></script>
  <script src="mascot-emotion.js"></script>
  <script src="mascot-interact.js"></script>
  <script src="launcher.js"></script>
  <script src="settings.js"></script>

  <!-- 3D renderer only runs if tier is 3d -->
  <script>
    if (window.letheTier === '3d') {
      document.write('<script src="mascot-3d-renderer.js"><\/script>');
    }
  </script>
</body>
</html>
